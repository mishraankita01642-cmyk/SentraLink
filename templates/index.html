<!DOCTYPE html>
<html>
<head>
    <title>SentraLink</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Logo -->
    <img src="{{ url_for('static', filename='logo.png') }}" alt="SentraLink Logo" class="logo">

    <!-- Main Container -->
    <div class="container">

        <!-- Form -->
        <form method="POST">
            <div class="search-box">
                <input type="text" name="url" placeholder="Enter URL here..." required>
            </div>
        </form>

        <!-- Result Section -->
        {% if result %}
        <div class="result">
            <h2>Result: {{ result }}</h2>

            {% if reasons %}
            <h3>Reasons:</h3>
            <ul>
                {% for reason in reasons %}
                    <li>{{ reason }}</li>
                {% endfor %}
            </ul>
            {% endif %}

        </div>
        {% endif %}

    </div>

</body>
</html>
