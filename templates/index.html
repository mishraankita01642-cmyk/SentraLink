<!DOCTYPE html>
<html>
<head>
    <title>SentraLink</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<!-- 🔥 LOGO (Sticker Style) -->
<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<div class="container">

    <p class="subtitle">Advanced Cyber URL Intelligence System</p>

    <!-- 🔍 SEARCH BAR -->
    <form method="POST">
        <div class="search-box">
            <input type="text" name="url" placeholder="Enter URL here..." required>
            <button type="submit">🔍</button>
        </div>
    </form>

    <!-- RESULT -->
    {% if result %}
    <div class="result">
        <h2>Result: {{ result }}</h2>

        {% if reasons %}
        <h3>Reasons:</h3>
        <ul>
            {% for reason in reasons %}
            <li>{{ reason }}</li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>
    {% endif %}

</div>

</body>
</html>
